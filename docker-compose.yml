services:
  api:
    build: .
    container_name: kfc-dasboard-installs-api
    env_file:
      - .env
    ports:
      - "8030:8030"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11.4
    container_name: kfc-app-installs-db
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-kfc_app_installs}
      MARIADB_USER: ${MARIADB_USER:-kfc_app_installs}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-kfc_app_installs}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-kfc_app_installs_root}
    volumes:
      - kfc_app_installs_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u\"$${MARIADB_USER}\" -p\"$${MARIADB_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  kfc_app_installs_mariadb_data:
